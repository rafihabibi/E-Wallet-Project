<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="../style/changePassword.css">
</head>
<body>
    <header>
        <p id="e-wallet-logo"><img src="../assets/E-wallet-small.png" alt="E-wallet">E-Wallet</p>
        <div class="profile-grup">
            <span>Ghaluh Wizard</span>
            <img src="../assets/ghaluh.png" alt="profile Picture" class="profile-pic">
            <img src="../assets/down.png" alt="" class="icon-down">
            <div class="dropdown-menu">
                <a href="#" class="dropdown-item btn-profile">
                    <img src="../assets/2 User.png" alt="Profile"> Profile
                </a>
                <a href="#" class="dropdown-item btn-logout">
                    <img src="../assets/logout.png" alt="Logout"> Keluar
                </a>
            </div>
        </div>
    </header>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <ul>
                <li><img src="../assets/dashboard-trans.png" alt="dashboard logo"><a href="../pages/dashboard.html" class="icon-dash">Dashboard</a></li>
                <li><img src="../assets/Send-dashboard.png" alt=""><a href="../pages/transfer.html"class="transfer-icon">Transfer</a></li>
                <li><img src="../assets/history.png" alt=""><a href="../pages/history.html" class="history-icon">History</a></li>
                <li class="topUp-icon"><img src="../assets/Upload.png" alt="">Top Up</li>
                <li class="active"><img src="../assets/profile-icon.png" alt=""><a href="../pages/profile.html" class="profile-icon">Profile</a></li>
                <li class="logout"><img src="../assets/logout.png" alt="logo keluar">Keluar</li>
            </ul>
        </aside>
    <main class="main-content">
        <section class="change-password-wrapper">
            <div class="page-header">
                    <img src="../assets/2 User-blue.png" alt="clock">
                    <h2>Profile</h2>
                </div>
            <div class="form-container">
                <h3 class="page-title">Change Password</h3>
                <form action="">
                    <div class="input-group">
                            <label for="password">Existing Password</label>
                            <div class="input-wrapper">
                                <img src="../assets/Password.png" alt="lock-icon" class="input-icon">
                                <input type="password" name="password" id="password" placeholder="Enter Your Existing Password">
                                <img src="../assets/Hide.png" alt="eye-icon" class="eye-icon">
                            </div>  
                        </div>
                    <div class="input-group">
                            <label for="password">New Password</label>
                            <div class="input-wrapper">
                                <img src="../assets/Password.png" alt="lock-icon" class="input-icon">
                                <input type="password" name="password" id="password" placeholder="Enter Your New Password">
                                <img src="../assets/Hide.png" alt="eye-icon" class="eye-icon">
                            </div>  
                        </div>
                    <div class="input-group">
                            <label for="password">Confirm Password</label>
                            <div class="input-wrapper">
                                <img src="../assets/Password.png" alt="lock-icon" class="input-icon">
                                <input type="password" name="password" id="password" placeholder="Re-Type Your New Password">
                                <img src="../assets/Hide.png" alt="eye-icon" class="eye-icon">
                            </div>  
                        </div>
                        <button type="submit" class="btn-submit">Submit</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
