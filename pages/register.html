<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../style/register.css">
</head>
<body>
    <main class="split-container">
        
            <div class="form-container">
                <p id="e-wallet-logo"><img src="../assets/E-wallet-small.png" alt="E-wallet">E-Wallet</p>
                <h2 id="title">Start Accessing Banking Needs  With All Devices and All Platforms With 30.000+ Users</h2>
                <p id="small-text">Transfering money is eassier than ever, you can access Zwallet wherever you are. Desktop, laptop, mobile phone? we cover all of that for you!</p>
                <button class="btn-sign-in-google"><img src="../assets/icon-google.png" alt="icon google" class="icon-g"><span>Sign in With Google</span></button>
                <button class="btn-sign-in-facebook"><img src="../assets/icon-facebook.png" alt="icon facebook" class="icon-fb"><span>Sign in With Facebook</span></button>
                <div class="separator">or</div>

                    <form action="">
                        <div class="input-group">
                            <label for="email">Email</label>
                            <div class="input-wrapper">
                                 <img src="../assets/Message.png" alt="main-icon" class="input-icon">
                                 <input type="email" id="email" name="email" placeholder="Enter Your Email">
                             </div>
                        </div>

                        <div class="input-group">
                            <label for="password">Password</label>
                            <div class="input-wrapper">
                                <img src="../assets/Password.png" alt="lock-icon" class="input-icon">
                                <input type="password" name="password" id="password" placeholder="Enter Your Password">
                                <img src="../assets/Hide.png" alt="eye-icon" class="eye-icon">
                            </div>  
                        </div>
                        <div class="input-group">
                            <label for="confirm-password">Confirm Password</label>
                             <div class="input-wrapper">
                                <img src="../assets/Password.png" alt="lock-icon" class="input-icon">
                                <input type="password" name="confirm-password" id="confirm-password" placeholder="Enter Your Password Again">
                            <img src="../assets/Hide.png" alt="eye-icon" class="eye-icon">
                        </div>

                        </div>
                        
                        <button type="submit" class="btn-register">Register</button>
                    </form>
                <div class="alredy-have-account">
                    <p>Have An Account? <a href="">Login</a></p>
                </div>
             </div>
        <div class="img-container">
            <img src="../assets/E-Wallet-big.png" alt="logo Image">
        </div>
    </main>
    
</body>
</html>
