<!DOCTYPE html>
<html lang="en">
<head>

                <input type="text" class="pin-field" maxlength="1" inputmode="numeric">
                <input type="text" class="pin-field" maxlength="1" inputmode="numeric">

                <input type="text" class="pin-field" maxlength="1" inputmode="numeric">
                <input type="text" class="pin-field" maxlength="1" inputmode="numeric">
            </div>
         <button type="submit" class="btn-submit">Submit</button>
         </form>
         <div class="forgot-pin">
            <p>Forgot Your Pin? <a href="../pages/forgotPassword.html">Reset</a></p>
         </div>
       </div>
       <div class="img-container">
            <img src="../assets/guyHoldingALaptop.png" alt="guy holding a Image">
