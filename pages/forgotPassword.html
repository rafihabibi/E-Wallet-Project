<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../style/forgotPassword.css">
</head>
<body>
    <main>
        <div class="form-container">
            <p id="e-wallet-logo"><img src="../assets/E-wallet-small.png" alt="E-wallet">E-Wallet</p>
            <h2 id="title">Fill Out Form Correctly 👋</h2>
            <p id="small-text">We will send new password to your email</p>
            <form action="">
                <div class="input-email">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                         <img src="../assets/Message.png" alt="main-icon" class="input-icon">
                         <input type="email" id="email" name="email" placeholder="Enter Your Email">
                    </div>
                </div>
                <button type="submit" class="btn-submit">Submit</button>
            </form>
        </div>
    </main>
</body>
</html>
